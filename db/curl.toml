command = "curl"
default = "safe"

[[flags]]
flag = ["-X", "--request"]
effect = "unknown"
reason = "Depends on HTTP method"

[flags.values]
GET = "safe"
HEAD = "safe"
POST = "write"
PUT = "write"
DELETE = "write"
PATCH = "write"

[[flags]]
flag = ["-d", "--data", "--data-raw", "--data-binary"]
effect = "write"
reason = "Sends data (implies POST)"

[[flags]]
flag = ["-o", "--output"]
effect = "write"
reason = "Writes response to file"
