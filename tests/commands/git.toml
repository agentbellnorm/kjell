[[tests]]
input = "git log"
expect = "safe"

[[tests]]
input = "git log --oneline -20"
expect = "safe"

[[tests]]
input = "git diff"
expect = "safe"

[[tests]]
input = "git status"
expect = "safe"

[[tests]]
input = "git show HEAD"
expect = "safe"

[[tests]]
input = "git branch"
expect = "safe"

[[tests]]
input = "git remote -v"
expect = "safe"

[[tests]]
input = "git fetch"
expect = "safe"

[[tests]]
input = "git commit -m 'feat: spawn'"
expect = "write"

[[tests]]
input = "git push"
expect = "write"

[[tests]]
input = "git push --force"
expect = "write"

[[tests]]
input = "git add ."
expect = "write"

[[tests]]
input = "git checkout main"
expect = "write"

[[tests]]
input = "git merge main"
expect = "write"

[[tests]]
input = "git rebase main"
expect = "write"

[[tests]]
input = "git reset --hard"
expect = "write"

[[tests]]
input = "git stash"
expect = "write"

[[tests]]
input = "git pull"
expect = "write"

[[tests]]
input = "git init"
expect = "write"

[[tests]]
input = "git clone https://github.com/foo/bar.git"
expect = "write"

[[tests]]
input = "git -C /some/path log --oneline -5"
expect = "safe"
note = "Flag -C takes an argument; subcommand is log, not the path"

[[tests]]
input = "git -C /some/path status"
expect = "safe"
note = "Flag -C with path value should not prevent subcommand detection"

[[tests]]
input = "git -C /some/path commit -m 'test'"
expect = "write"
note = "Flag -C with path value, subcommand commit is write"
