[[tests]]
input = "echo hello > file.txt"
expect = "write"
note = "Redirect operator makes it a write regardless of command"

[[tests]]
input = "echo msg >> log.txt"
expect = "write"

[[tests]]
input = "grep error log.txt > output.txt"
expect = "write"

[[tests]]
input = "cat file 2> /dev/null"
expect = "safe"
note = "Redirect to /dev/null is not a real write"

[[tests]]
input = "grep error log.txt 2>/dev/null"
expect = "safe"
note = "Suppressing stderr with /dev/null is harmless"

[[tests]]
input = "ls foo > /dev/null"
expect = "safe"
note = "Redirect stdout to /dev/null is not a real write"

[[tests]]
input = "ls foo > /dev/null 2>&1"
expect = "safe"
note = "Common output suppression pattern, not a write"

[[tests]]
input = "cat file 2> errors.log"
expect = "write"
note = "stderr redirect to a real file is a write"

[[tests]]
input = "sort < input.txt"
expect = "safe"
note = "Input redirect is not a write"
