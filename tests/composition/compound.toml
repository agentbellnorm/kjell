[[tests]]
input = "ls && pwd"
expect = "safe"

[[tests]]
input = "ls && rm file"
expect = "write"

[[tests]]
input = "ls || rm file"
expect = "write"

[[tests]]
input = "ls ; rm file"
expect = "write"

[[tests]]
input = "git status && git log --oneline"
expect = "safe"

[[tests]]
input = "git add . && git commit -m 'test'"
expect = "write"

[[tests]]
input = "mkdir -p dir && cp file dir/"
expect = "write"
