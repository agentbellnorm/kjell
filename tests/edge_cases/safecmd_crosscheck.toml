## === safecmd BLOCKED commands ===

[[tests]]
input = "rm -rf /"
expect = "write"

[[tests]]
input = "find / -exec rm {} \\;"
expect = "write"
note = "find -exec with destructive inner command"

[[tests]]
input = "find . -delete"
expect = "write"

[[tests]]
input = "git push"
expect = "write"

[[tests]]
input = "sudo ls"
expect = "read"
note = "We classify sudo ls as read (recursive eval). safecmd blocks all sudo. Our approach is more permissive but correct."

[[tests]]
input = "env rm -rf /asdfff"
expect = "write"

[[tests]]
input = "ls $(rm -rf /)"
expect = "write"
note = "Destructive command substitution"

[[tests]]
input = "xargs rm"
expect = "write"

## === Write operations safecmd blocks ===

[[tests]]
input = "npm install"
expect = "write"

[[tests]]
input = "docker build ."
expect = "write"

[[tests]]
input = "docker pull nginx"
expect = "write"

[[tests]]
input = "git commit -m 'test'"
expect = "write"

[[tests]]
input = "git checkout main"
expect = "write"

[[tests]]
input = "vim file.txt"
expect = "write"

## === Archive/extraction tools ===

[[tests]]
input = "tar -xvf file.tar"
expect = "write"
note = "-x extracts, which is a write"

[[tests]]
input = "tar -tf archive.tar"
expect = "read"
note = "-t just lists contents"

[[tests]]
input = "unzip archive.zip"
expect = "write"
