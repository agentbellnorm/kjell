## Cross-validation against safecmd (https://github.com/AnswerDotAI/safecmd)
## Every command safecmd allows should be read; every command it blocks should be write/unknown.

## === safecmd ALLOWED commands ===

[[tests]]
input = "ls -la"
expect = "read"

[[tests]]
input = "ls -la | grep py"
expect = "read"

[[tests]]
input = "git status"
expect = "read"

[[tests]]
input = "find . -name '*.py'"
expect = "read"

[[tests]]
input = "echo hello"
expect = "read"

[[tests]]
input = "find . -exec ls \\;"
expect = "read"

[[tests]]
input = "env ls"
expect = "read"

[[tests]]
input = "sed 1,3p styles.css"
expect = "read"

[[tests]]
input = "echo hello | cat"
expect = "read"

[[tests]]
input = "[ -f /etc/passwd ] && echo exists"
